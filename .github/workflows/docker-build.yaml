name: Build and Push Docker Image to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile.dev

jobs:
  publish-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f Dockerfile.dev . -t obrat/fastauth:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: obrat
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        run: docker push obrat/fastauth:latest

        